<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Markdown Novel Reader</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f5ef;
      --panel: #fffdf8;
      --text: #24211d;
      --muted: #716a61;
      --line: #ded8cb;
      --accent: #8a4b22;
      --accent-soft: #f1e1d2;
      --quote: #5b544b;
      --shadow: 0 16px 42px rgba(53, 40, 25, 0.12);
      --reader-font-size: 20px;
      --reader-line-height: 1.85;
    }

    [data-theme="dark"] {
      color-scheme: dark;
      --bg: #171717;
      --panel: #202020;
      --text: #eee9df;
      --muted: #b7ad9e;
      --line: #393632;
      --accent: #d09a62;
      --accent-soft: #3a2b20;
      --quote: #d0c6b7;
      --shadow: none;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: ui-serif, Georgia, "Times New Roman", serif;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      border-right: 1px solid var(--line);
      background: var(--panel);
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .brand {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--line);
    }

    .brand h1 {
      font-size: 18px;
      margin: 0 0 12px;
      letter-spacing: 0;
      line-height: 1.35;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .search,
    .story-select {
      width: 100%;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--text);
      border-radius: 6px;
      padding: 9px 10px;
      min-width: 0;
    }

    .story-select {
      margin-bottom: 10px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .icon-button,
    .chapter-button,
    .nav-button {
      border: 1px solid var(--line);
      background: transparent;
      color: var(--text);
      border-radius: 6px;
      cursor: pointer;
    }

    .icon-button {
      width: 40px;
      height: 40px;
      display: inline-grid;
      place-items: center;
    }

    .settings-panel {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--line);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .setting-row {
      display: grid;
      gap: 7px;
    }

    .setting-label {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .setting-row input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .chapters {
      overflow: auto;
      padding: 10px;
      display: grid;
      gap: 4px;
    }

    .chapter-button {
      text-align: left;
      padding: 9px 10px;
      line-height: 1.35;
      border-color: transparent;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
    }

    .chapter-button:hover,
    .chapter-button.active {
      background: var(--accent-soft);
      border-color: var(--line);
    }

    .main {
      min-width: 0;
      padding: 28px;
    }

    .reader {
      max-width: 900px;
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      border-radius: 8px;
      overflow: hidden;
    }

    .reader-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--muted);
      font-size: 14px;
    }

    .load-progress {
      height: 4px;
      background: var(--accent-soft);
      border-bottom: 1px solid var(--line);
      overflow: hidden;
    }

    .load-progress[hidden] {
      display: none;
    }

    .load-progress-bar {
      width: 0;
      height: 100%;
      background: var(--accent);
      transition: width 160ms ease;
    }

    .nav {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .nav-button {
      padding: 8px 11px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .reader-bottom {
      justify-content: center;
      padding: 14px 16px 18px;
      border-top: 1px solid var(--line);
    }

    .nav-button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    article {
      padding: clamp(22px, 5vw, 58px);
      font-size: var(--reader-font-size);
      line-height: var(--reader-line-height);
    }

    article h1 {
      margin: 0 0 18px;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.25;
      letter-spacing: 0;
      color: var(--accent);
    }

    article h2,
    article h3 {
      margin-top: 34px;
      line-height: 1.35;
    }

    article p {
      margin: 0 0 18px;
    }

    article hr {
      border: 0;
      border-top: 1px solid var(--line);
      margin: 24px 0 30px;
    }

    article blockquote {
      margin: 0 0 18px;
      padding: 0 0 0 18px;
      border-left: 4px solid var(--accent);
      color: var(--quote);
      font-style: italic;
    }

    article strong {
      color: var(--accent);
    }

    .empty {
      color: var(--muted);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .mobile-toggle {
      display: none;
    }

    @media (max-width: 820px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: fixed;
        z-index: 10;
        width: min(86vw, 340px);
        transform: translateX(-100%);
        transition: transform 180ms ease;
      }

      body.menu-open .sidebar {
        transform: translateX(0);
      }

      .mobile-toggle {
        display: inline-grid;
        position: fixed;
        z-index: 11;
        left: 12px;
        top: 12px;
        background: var(--panel);
      }

      .main {
        padding: 64px 10px 18px;
      }

      .reader {
        border-radius: 0;
      }

      .reader-top {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <button class="icon-button mobile-toggle" id="menuToggle" title="Mở danh sách chương">☰</button>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <h1>Thư Viện Truyện</h1>
        <select class="story-select" id="storySelect" title="Chọn truyện"></select>
        <div class="toolbar">
          <input class="search" id="search" type="search" placeholder="Tìm chương...">
          <button class="icon-button" id="themeToggle" title="Đổi giao diện">◐</button>
        </div>
      </div>
      <div class="settings-panel">
        <div class="setting-row">
          <label class="setting-label" for="fontSizeInput">
            <span>Cỡ chữ</span>
            <span id="fontSizeValue">20px</span>
          </label>
          <input id="fontSizeInput" type="range" min="16" max="28" step="1" value="20">
        </div>
        <div class="setting-row">
          <label class="setting-label" for="lineHeightInput">
            <span>Giãn dòng</span>
            <span id="lineHeightValue">1.85</span>
          </label>
          <input id="lineHeightInput" type="range" min="1.4" max="2.4" step="0.05" value="1.85">
        </div>
      </div>
      <nav class="chapters" id="chapters"></nav>
    </aside>

    <main class="main">
      <section class="reader">
        <div class="reader-top">
          <div id="status">Đang tải danh sách chương...</div>
          <div class="nav">
            <button class="nav-button" id="prevBtn">Trước</button>
            <button class="nav-button" id="nextBtn">Sau</button>
          </div>
        </div>
        <div class="load-progress" id="loadProgress" hidden aria-hidden="true">
          <div class="load-progress-bar" id="loadProgressBar"></div>
        </div>
        <article id="content">
          <p class="empty">Chọn một chương để bắt đầu đọc.</p>
        </article>
        <div class="nav reader-bottom">
          <button class="nav-button" id="bottomPrevBtn">Trước</button>
          <button class="nav-button" id="bottomNextBtn">Sau</button>
        </div>
      </section>
    </main>
  </div>

  <script>
    const stories = [
      {
        id: "vong-du-tu-vong-vo-hiep",
        title: "Vong Du Tu Vong Vo Hiep",
        path: "truyen/vong-du-tu-vong-vo-hiep/",
        manifest: "chapters.json",
        chapters: [
          ...range(1327, 1456).map(n => `${n}.md`)
        ]
      },
      {
        id: "cao-vo-ky-nguyen",
        title: "Cao Võ Kỷ Nguyên",
        path: "truyen/cao-vo-ky-nguyen/",
        manifest: "chapters.json",
        chapters: [
          ...range(763, 766).map(n => `${n}.md`)
        ]
      }
    ];

    const state = {
      story: stories[0],
      chapters: [],
      current: -1,
      query: "",
      loadToken: 0
    };

    const els = {
      body: document.body,
      chapters: document.getElementById("chapters"),
      content: document.getElementById("content"),
      status: document.getElementById("status"),
      search: document.getElementById("search"),
      storySelect: document.getElementById("storySelect"),
      fontSizeInput: document.getElementById("fontSizeInput"),
      fontSizeValue: document.getElementById("fontSizeValue"),
      lineHeightInput: document.getElementById("lineHeightInput"),
      lineHeightValue: document.getElementById("lineHeightValue"),
      loadProgress: document.getElementById("loadProgress"),
      loadProgressBar: document.getElementById("loadProgressBar"),
      themeToggle: document.getElementById("themeToggle"),
      menuToggle: document.getElementById("menuToggle"),
      prevBtn: document.getElementById("prevBtn"),
      nextBtn: document.getElementById("nextBtn"),
      bottomPrevBtn: document.getElementById("bottomPrevBtn"),
      bottomNextBtn: document.getElementById("bottomNextBtn")
    };

    init();

    function range(start, end) {
      return Array.from({ length: end - start + 1 }, (_, i) => start + i);
    }

    function init() {
      const savedTheme = localStorage.getItem("reader-theme");
      if (savedTheme) document.documentElement.dataset.theme = savedTheme;
      initReadingSettings();

      renderStoryOptions();

      const savedStory = localStorage.getItem("reader-story");
      const initialStory = stories.find(story => story.id === savedStory);
      if (initialStory) state.story = initialStory;
      els.storySelect.value = state.story.id;

      els.storySelect.addEventListener("change", () => {
        const story = stories.find(item => item.id === els.storySelect.value);
        if (!story) return;
        state.story = story;
        state.query = "";
        els.search.value = "";
        localStorage.setItem("reader-story", story.id);
        loadServerChapters();
      });

      els.search.addEventListener("input", () => {
        state.query = els.search.value.trim().toLowerCase();
        renderChapterList();
      });

      els.fontSizeInput.addEventListener("input", () => setReaderFontSize(els.fontSizeInput.value));
      els.lineHeightInput.addEventListener("input", () => setReaderLineHeight(els.lineHeightInput.value));
      els.themeToggle.addEventListener("click", toggleTheme);
      els.menuToggle.addEventListener("click", () => els.body.classList.toggle("menu-open"));
      els.prevBtn.addEventListener("click", () => openByOffset(-1));
      els.nextBtn.addEventListener("click", () => openByOffset(1));
      els.bottomPrevBtn.addEventListener("click", () => openByOffset(-1));
      els.bottomNextBtn.addEventListener("click", () => openByOffset(1));

      loadServerChapters();
    }

    function renderStoryOptions() {
      els.storySelect.innerHTML = "";
      for (const story of stories) {
        const option = document.createElement("option");
        option.value = story.id;
        option.textContent = story.title;
        els.storySelect.appendChild(option);
      }
    }

    async function loadServerChapters() {
      const loadToken = ++state.loadToken;

      els.content.innerHTML = `<p class="empty">Đang tải danh sách chương...</p>`;
      setLoadingProgress(35, 100, "Đang tải danh sách chương...");

      try {
        const response = await fetch(manifestPath(), { cache: "no-store", credentials: "same-origin" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const manifest = await response.json();
        if (loadToken !== state.loadToken) return;

        const chapters = Array.isArray(manifest.chapters) ? manifest.chapters : [];
        setLoadingProgress(100, 100, "Đã tải danh sách chương");
        hideLoadingProgress();
        setChapters(chapters.map(makeChapterFromMeta));
      } catch (error) {
        console.warn("Không tải được manifest chương", error);
        if (loadToken !== state.loadToken) return;

        hideLoadingProgress();
        setChapters(state.story.chapters.map(name => makeChapterFromMeta({ name })));
        els.status.textContent = `${state.story.title} · ${state.chapters.length} chương · dùng tiêu đề từ tên file`;
      }
    }

    function makeChapterFromMeta(meta) {
      return {
        name: meta.name,
        title: meta.title || cleanTitle(meta.name),
        text: "",
        file: null,
        path: chapterPath(meta.name)
      };
    }

    function setLoadingProgress(done, total, message) {
      const percent = total ? Math.round((done / total) * 100) : 0;
      els.status.textContent = message;
      els.loadProgress.hidden = false;
      els.loadProgress.setAttribute("aria-hidden", "false");
      els.loadProgressBar.style.width = `${Math.min(100, Math.max(0, percent))}%`;
    }

    function hideLoadingProgress() {
      els.loadProgress.hidden = true;
      els.loadProgress.setAttribute("aria-hidden", "true");
      els.loadProgressBar.style.width = "0";
    }

    function chapterPath(name) {
      return new URL(`${state.story.path}${name}`, document.baseURI).href;
    }

    function manifestPath() {
      return new URL(`${state.story.path}${state.story.manifest || "chapters.json"}`, document.baseURI).href;
    }

    function makeChapter(name, text, file = null, path = "") {
      const titleLine = text.split(/\r?\n/).find(line => line.trim().startsWith("# "));
      return {
        name,
        title: titleLine ? titleLine.replace(/^#\s*/, "").trim() : cleanTitle(name),
        text,
        file,
        path
      };
    }

    function setChapters(chapters) {
      state.chapters = chapters;
      state.current = -1;
      els.status.textContent = `${state.story.title} · ${chapters.length} chương`;
      els.content.innerHTML = `<p class="empty">Chọn một chương để bắt đầu đọc.</p>`;
      renderChapterList();
      updateNav();
    }

    function cleanTitle(name) {
      return name
        .replace(/\.md$|\.markdown$/i, "")
        .replace(/_/g, " ");
    }

    function renderChapterList() {
      const query = state.query;
      els.chapters.innerHTML = "";

      state.chapters
        .map((chapter, index) => ({ chapter, index }))
        .filter(({ chapter }) => {
          const haystack = `${chapter.name} ${chapter.title}`.toLowerCase();
          return !query || haystack.includes(query);
        })
        .forEach(({ chapter, index }) => {
          const button = document.createElement("button");
          button.className = "chapter-button";
          if (index === state.current) button.classList.add("active");
          button.textContent = chapter.title;
          button.title = chapter.name;
          button.addEventListener("click", () => openChapter(index));
          els.chapters.appendChild(button);
        });
    }

    function openByOffset(offset) {
      const nextIndex = state.current + offset;
      if (nextIndex >= 0 && nextIndex < state.chapters.length) {
        openChapter(nextIndex);
      }
    }

    async function openChapter(index) {
      const chapter = state.chapters[index];
      if (!chapter) return;
      const loadToken = ++state.loadToken;

      if (!chapter.text) {
        try {
          setLoadingProgress(40, 100, `Đang tải ${chapter.name}...`);
          els.status.textContent = `Đang tải ${chapter.name}...`;
          els.content.innerHTML = `<p class="empty">Đang tải ${escapeHtml(chapter.name)}...</p>`;
          const response = await fetch(chapter.path || chapter.name, { cache: "no-store" });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const text = await response.text();
          if (loadToken !== state.loadToken) return;
          setLoadingProgress(100, 100, `Đã tải ${chapter.name}`);
          chapter.text = text;
          chapter.title = makeChapter(chapter.name, chapter.text).title;
        } catch (error) {
          hideLoadingProgress();
          els.content.innerHTML = `<p class="empty">Không thể tải ${escapeHtml(chapter.name)}. Hãy kiểm tra file chương đã được deploy lên GitHub Pages.</p>`;
          return;
        } finally {
          if (loadToken === state.loadToken) hideLoadingProgress();
        }
      }

      state.current = index;
      localStorage.setItem(`reader-last-chapter:${state.story.id}`, chapter.name);
      els.status.textContent = `${state.story.title} · ${index + 1}/${state.chapters.length} · ${chapter.name}`;
      els.content.innerHTML = renderMarkdown(chapter.text);
      document.title = `${chapter.title} · ${state.story.title}`;
      window.scrollTo({ top: 0, behavior: "smooth" });
      els.body.classList.remove("menu-open");
      renderChapterList();
      updateNav();
    }

    function updateNav() {
      const prevDisabled = state.current <= 0;
      const nextDisabled = state.current < 0 || state.current >= state.chapters.length - 1;
      els.prevBtn.disabled = prevDisabled;
      els.bottomPrevBtn.disabled = prevDisabled;
      els.nextBtn.disabled = nextDisabled;
      els.bottomNextBtn.disabled = nextDisabled;
    }

    function initReadingSettings() {
      const fontSize = clampNumber(localStorage.getItem("reader-font-size"), 16, 28, 20);
      const lineHeight = clampNumber(localStorage.getItem("reader-line-height"), 1.4, 2.4, 1.85);
      setReaderFontSize(fontSize);
      setReaderLineHeight(lineHeight);
    }

    function setReaderFontSize(value) {
      const size = clampNumber(value, 16, 28, 20);
      document.documentElement.style.setProperty("--reader-font-size", `${size}px`);
      els.fontSizeInput.value = size;
      els.fontSizeValue.textContent = `${size}px`;
      localStorage.setItem("reader-font-size", size);
    }

    function setReaderLineHeight(value) {
      const lineHeight = clampNumber(value, 1.4, 2.4, 1.85);
      const formatted = lineHeight.toFixed(2).replace(/0$/, "").replace(/\.0$/, "");
      document.documentElement.style.setProperty("--reader-line-height", formatted);
      els.lineHeightInput.value = formatted;
      els.lineHeightValue.textContent = formatted;
      localStorage.setItem("reader-line-height", formatted);
    }

    function clampNumber(value, min, max, fallback) {
      const number = Number(value);
      if (!Number.isFinite(number)) return fallback;
      return Math.min(max, Math.max(min, number));
    }

    function toggleTheme() {
      const current = document.documentElement.dataset.theme;
      const next = current === "dark" ? "" : "dark";
      if (next) {
        document.documentElement.dataset.theme = next;
        localStorage.setItem("reader-theme", next);
      } else {
        document.documentElement.removeAttribute("data-theme");
        localStorage.removeItem("reader-theme");
      }
    }

    function renderMarkdown(markdown) {
      const lines = markdown.replace(/\r\n/g, "\n").split("\n");
      const html = [];
      let paragraph = [];
      let quote = [];

      const flushParagraph = () => {
        if (!paragraph.length) return;
        html.push(`<p>${inline(paragraph.join(" "))}</p>`);
        paragraph = [];
      };

      const flushQuote = () => {
        if (!quote.length) return;
        html.push(`<blockquote>${quote.map(line => `<p>${inline(line)}</p>`).join("")}</blockquote>`);
        quote = [];
      };

      for (const rawLine of lines) {
        const line = rawLine.trim();

        if (!line) {
          flushParagraph();
          flushQuote();
          continue;
        }

        if (/^---+$/.test(line)) {
          flushParagraph();
          flushQuote();
          html.push("<hr>");
          continue;
        }

        const heading = line.match(/^(#{1,3})\s+(.+)$/);
        if (heading) {
          flushParagraph();
          flushQuote();
          const level = heading[1].length;
          html.push(`<h${level}>${inline(heading[2])}</h${level}>`);
          continue;
        }

        if (line.startsWith(">")) {
          flushParagraph();
          quote.push(line.replace(/^>\s?/, ""));
          continue;
        }

        flushQuote();
        paragraph.push(line);
      }

      flushParagraph();
      flushQuote();
      return html.join("\n");
    }

    function inline(value) {
      return escapeHtml(value)
        .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
        .replace(/\*(.+?)\*/g, "<em>$1</em>");
    }

    function escapeHtml(value) {
      return value
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }
  </script>
</body>
</html>
